<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scoot Bali — Mobile App UI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="src/data.js"></script>
<script type="text/babel">

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, \"SF Pro\", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

const G = {
  black: '#000', white: '#fff',
  g100: '#F5F5F5', g200: '#E8E8E8', g300: '#CCCCCC', g500: '#888', g700: '#444',
  gold: '#FFD700', goldD: '#C9A800',
};

function IosFrame({ children, statusBarStyle = 'dark', hideKeyboard = false }) {
  return (
    <IOSDevice
      width={402}
      height={874}
      dark={statusBarStyle === 'light'}
      keyboard={!hideKeyboard}
    >
      {children}
    </IOSDevice>
  );
}

/* ─── TINY COMPONENTS ─── */
function MBtn({ children, variant='gold', onClick, style }) {
  const vars = {
    gold: { bg: G.gold, color: G.black },
    dark: { bg: G.black, color: G.white },
    outline: { bg: 'transparent', color: G.black, border: `1.5px solid ${G.black}` },
    ghost: { bg: G.g100, color: G.black },
    'outline-white': { bg: 'transparent', color: G.white, border: '1.5px solid rgba(255,255,255,0.5)' },
  };
  const v = vars[variant];
  return (
    <button onClick={onClick} style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, padding:'14px 24px', borderRadius:14, fontFamily:'Inter', fontWeight:700, fontSize:15, border:'none', cursor:'pointer', width:'100%', ...v, ...style }}>
      {children}
    </button>
  );
}

function MStars({ r=5, sz=11 }) {
  return <span>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=r?G.gold:G.g300,fontSize:sz}}>★</span>)}</span>;
}

function MBadge({ children, v='default' }) {
  const vars = { default:{bg:G.g100,color:G.g700}, gold:{bg:G.gold,color:G.black}, green:{bg:'#e6f7ee',color:'#166534'}, black:{bg:G.black,color:G.white} };
  const s = vars[v]||vars.default;
  return <span style={{background:s.bg,color:s.color,padding:'3px 9px',borderRadius:100,fontSize:10,fontWeight:700,fontFamily:'Inter',textTransform:'uppercase',letterSpacing:'0.05em'}}>{children}</span>;
}

function ScooterThumb({ s, h=140 }) {
  return (
    <div style={{ width:'100%', height:h, background:`linear-gradient(145deg,${s.accent||'#111'} 0%,#1a1a1a 100%)`, borderRadius:12, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden' }}>
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
        {Array.from({length:10},(_,i)=><line key={i} x1={i*22} y1={0} x2={i*22-60} y2={h} stroke="rgba(255,255,255,0.025)" strokeWidth="14"/>)}
      </svg>
      <div style={{position:'relative',textAlign:'center'}}>
        <div style={{color:'rgba(255,255,255,0.55)',fontSize:13,fontFamily:'Sora',fontWeight:700}}>{s.name}</div>
        <div style={{color:G.gold,fontSize:10,marginTop:4,fontFamily:'Inter',letterSpacing:'0.1em'}}>{s.engine}</div>
      </div>
    </div>
  );
}

function BottomNav({ active }) {
  const tabs = [['🏠','Home'],['🔍','Fleet'],['📋','Bookings'],['👤','Profile']];
  return (
    <div style={{ position:'absolute', bottom:0, left:0, right:0, height:82, background:G.white, borderTop:'1px solid #ebebeb', display:'flex', paddingBottom:16, paddingTop:10 }}>
      {tabs.map(([icon,label],i)=>(
        <div key={label} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
          <span style={{ fontSize:20, filter: active===i?'none':'grayscale(1) opacity(0.5)' }}>{icon}</span>
          <span style={{ fontFamily:'Inter', fontSize:10, fontWeight:600, color: active===i?G.black:G.g500 }}>{label}</span>
          {active===i && <div style={{width:4,height:4,borderRadius:'50%',background:G.gold,marginTop:2}}/>}
        </div>
      ))}
    </div>
  );
}

function SearchBar({ placeholder='Search vehicles...' }) {
  return (
    <div style={{ background:G.g100, borderRadius:12, padding:'11px 14px', display:'flex', alignItems:'center', gap:8, margin:'0 0 16px' }}>
      <span style={{ fontSize:15, color:G.g500 }}>🔍</span>
      <span style={{ fontFamily:'Inter', fontSize:14, color:G.g500 }}>{placeholder}</span>
    </div>
  );
}

/* ─── SCREENS ─── */

function Splash() {
  return (
    <div style={{ width:390, height:844, background:'#060608', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative' }}>
      <div style={{position:'absolute',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,215,0,0.08) 0%,transparent 70%)',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}}/>
      <div style={{ width:72, height:72, background:G.gold, borderRadius:20, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:20, boxShadow:'0 16px 48px rgba(255,215,0,0.4)' }}>
        <span style={{ fontFamily:'Sora', fontWeight:900, fontSize:36, color:G.black }}>S</span>
      </div>
      <div style={{ fontFamily:'Sora', fontWeight:800, fontSize:28, color:G.white, letterSpacing:'-0.04em', marginBottom:6 }}>SCOOT <span style={{color:G.gold,fontWeight:500}}>BALI</span></div>
      <div style={{ fontFamily:'Inter', fontSize:13, color:'rgba(255,255,255,0.4)', letterSpacing:'0.08em', marginBottom:60 }}>Premium Scooter Rental</div>
      <div style={{ display:'flex', gap:6 }}>
        {[1,0,0].map((a,i)=><div key={i} style={{width:i===0?20:6,height:6,borderRadius:3,background:i===0?G.gold:'rgba(255,255,255,0.2)'}}/>)}
      </div>
    </div>
  );
}

function Onboarding({ n=1 }) {
  const screens = [
    { title:'Discover\nBali\'s Roads', sub:'Premium scooters for every journey — from rice terraces to clifftop temples.', cta:'Continue', step:1 },
    { title:'Book in\n3 Minutes', sub:'Select your dates, choose add-ons, and confirm. It\'s really that simple.', cta:'Next', step:2 },
    { title:'Delivered\nto Your Door', sub:'We bring your scooter to your villa or hotel, fueled and ready to ride.', cta:'Get Started', step:3 },
  ];
  const s = screens[n-1];
  return (
    <div style={{ width:390, height:844, background:'#080808', display:'flex', flexDirection:'column', position:'relative', overflow:'hidden' }}>
      {/* BG */}
      <div style={{ flex:1, background:`linear-gradient(180deg,#${['1a1a1a','141824','1a1410'][n-1]} 0%,#080808 100%)`, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
        <div style={{ fontFamily:'Inter', fontSize:11, letterSpacing:'0.15em', color:'rgba(255,255,255,0.2)', textTransform:'uppercase' }}>bali photography</div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:120,background:'linear-gradient(to top,#080808,transparent)'}}/>
      </div>
      <div style={{ padding:'32px 28px 48px', background:'#080808' }}>
        <h2 style={{ fontFamily:'Sora', fontWeight:900, fontSize:38, letterSpacing:'-0.05em', color:G.white, whiteSpace:'pre-line', lineHeight:1.05, marginBottom:16 }}>{s.title}</h2>

  { label: 'My Bookings', comp: <MyBookingsScreen /> },
  { label: 'Profile', comp: <ProfileScreen /> },
];

function MobileCanvas() {
  const [focused, setFocused] = React.useState(null);

  return (
    <div style={{ minHeight: '100vh', background: '#0a0a0a', padding: '48px 48px 80px' }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 48 }}>
        <div>
          <div style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: G.gold, marginBottom: 8 }}>iOS App</div>
          <h1 style={{ fontFamily: 'Sora', fontWeight: 800, fontSize: 36, letterSpacing: '-0.04em', color: G.white, margin: 0 }}>Scoot Bali — Mobile UI</h1>
        </div>
        <a href="Scoot Bali - Website.html" style={{ textDecoration: 'none' }}>
          <div style={{ padding: '12px 24px', background: G.gold, borderRadius: 12, fontFamily: 'Inter', fontWeight: 700, fontSize: 14, color: G.black, cursor: 'pointer' }}>View Website →</div>
        </a>
      </div>

      {/* Grid */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 390px)', gap: 48, overflowX: 'auto' }}>
        {SCREENS.map((s, i) => (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16 }}>
            <div onClick={() => setFocused(i)} style={{ cursor: 'pointer', transition: 'transform 0.2s', transform: focused === i ? 'scale(1.02)' : 'scale(1)' }}>
              <IosFrame statusBarStyle="light" hideKeyboard={true}>
                {s.comp}
              </IosFrame>
            </div>
            <div style={{ fontFamily: 'Inter', fontWeight: 600, fontSize: 13, color: 'rgba(255,255,255,0.5)', letterSpacing: '0.02em' }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Focused overlay */}
      {focused !== null && (
        <div onClick={() => setFocused(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.9)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, cursor: 'pointer' }}>
          <div onClick={e => e.stopPropagation()} style={{ transform: 'scale(1.1)' }}>
            <IosFrame statusBarStyle="light" hideKeyboard={true}>
              {SCREENS[focused].comp}
            </IosFrame>
          </div>
          <div style={{ position: 'absolute', top: 32, right: 32, width: 44, height: 44, background: 'rgba(255,255,255,0.1)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 20, color: G.white }} onClick={() => setFocused(null)}>×</div>
          <div style={{ position: 'absolute', bottom: 48, color: 'rgba(255,255,255,0.5)', fontFamily: 'Inter', fontSize: 13 }}>{SCREENS[focused].label} · Click anywhere to close</div>
          <div style={{ position: 'absolute', left: 48, top: '50%', transform: 'translateY(-50%)', width: 48, height: 48, background: 'rgba(255,255,255,0.08)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 22, color: G.white }} onClick={() => setFocused(f => Math.max(0, f - 1))}>‹</div>
          <div style={{ position: 'absolute', right: 48, top: '50%', transform: 'translateY(-50%)', width: 48, height: 48, background: 'rgba(255,255,255,0.08)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 22, color: G.white }} onClick={() => setFocused(f => Math.min(SCREENS.length - 1, f + 1))}>›</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MobileCanvas />);
</script>
