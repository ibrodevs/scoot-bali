<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scoot Bali — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f7f7f8; color: #000; -webkit-font-smoothing: antialiased; height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  input, select, textarea, button { font-family: inherit; }
  input[type=range] { -webkit-appearance: none; height: 3px; background: #e0e0e0; border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #FFD700; cursor: pointer; }
</style>
</head>
<body>
<div id="root" style="height:100vh"></div>
<script src="src/data.js"></script>
<script type="text/babel">

const A = {
  bg: '#f7f7f8', sidebar: '#0d0d0d', white: '#ffffff',
  black: '#000000', gold: '#FFD700',
  g100: '#F5F5F5', g200: '#EBEBEB', g300: '#CCCCCC', g400: '#AAAAAA', g500: '#888888', g700: '#444444',
  green: '#16a34a', red: '#dc2626', blue: '#2563eb', orange: '#ea580c',
  greenBg: '#f0fdf4', redBg: '#fef2f2', blueBg: '#eff6ff', orangeBg: '#fff7ed',
};

/* ── MINI COMPONENTS ── */
function ABadge({ children, color='default' }) {
  const map = { default:[A.g100,A.g700], gold:[A.gold,A.black], green:[A.greenBg,A.green], red:[A.redBg,A.red], blue:[A.blueBg,A.blue], orange:[A.orangeBg,A.orange] };
  const [bg,c] = map[color]||map.default;
  return <span style={{background:bg,color:c,padding:'3px 10px',borderRadius:100,fontSize:11,fontWeight:700,fontFamily:'Inter',textTransform:'uppercase',letterSpacing:'0.05em',display:'inline-flex',alignItems:'center',gap:4}}>{children}</span>;
}

function ABtn({ children, variant='primary', size='sm', onClick, style }) {
  const vars = { primary:{bg:A.gold,color:A.black}, dark:{bg:A.black,color:A.white}, outline:{bg:'transparent',color:A.black,border:`1.5px solid ${A.g200}`}, ghost:{bg:A.g100,color:A.g700} };
  const v = vars[variant]||vars.primary;
  const sz = size==='md'?'10px 20px':'8px 14px';
  const fs = size==='md'?14:12;
  return <button onClick={onClick} style={{padding:sz,fontSize:fs,fontWeight:600,fontFamily:'Inter',borderRadius:8,border:'none',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,whiteSpace:'nowrap',...v,...style}}>{children}</button>;
}

function KpiCard({ label, value, delta, color='black', icon }) {
  const pos = delta?.startsWith('+');
  return (
    <div style={{background:A.white,borderRadius:14,padding:'22px 24px',border:`1px solid ${A.g200}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
        <div style={{fontFamily:'Inter',fontSize:12,fontWeight:600,color:A.g500,letterSpacing:'0.06em',textTransform:'uppercase'}}>{label}</div>
        <div style={{width:36,height:36,background:color===A.gold?A.gold:A.g100,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
      </div>
      <div style={{fontFamily:'Sora',fontWeight:800,fontSize:32,letterSpacing:'-0.04em',color:A.black,marginBottom:8}}>{value}</div>
      {delta && <div style={{fontFamily:'Inter',fontSize:12,color:pos?A.green:A.red,fontWeight:600}}>{pos?'↑':'↓'} {delta} vs last month</div>}
    </div>
  );
}

function SectionHeader({ title, subtitle, action }) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:20}}>
      <div>
        <h2 style={{fontFamily:'Sora',fontWeight:700,fontSize:22,letterSpacing:'-0.03em',color:A.black,marginBottom:3}}>{title}</h2>
        {subtitle && <p style={{fontFamily:'Inter',fontSize:13,color:A.g500}}>{subtitle}</p>}
      </div>
      {action}
    </div>
  );
}

function Table({ cols, rows }) {
  return (
    <div style={{background:A.white,borderRadius:14,border:`1px solid ${A.g200}`,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:cols.map(c=>c.w||'1fr').join(' '),padding:'12px 20px',borderBottom:`1px solid ${A.g200}`,background:A.g100}}>
        {cols.map(c=><div key={c.key} style={{fontFamily:'Inter',fontSize:11,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:A.g500}}>{c.label}</div>)}
      </div>
      {rows.map((row,i)=>(
        <div key={i} style={{display:'grid',gridTemplateColumns:cols.map(c=>c.w||'1fr').join(' '),padding:'14px 20px',borderBottom:i<rows.length-1?`1px solid ${A.g200}`:'none',alignItems:'center'}}>
          {cols.map(c=><div key={c.key}>{row[c.key]}</div>)}
        </div>
      ))}
    </div>
  );
}

/* ── VIEWS ── */

function Overview() {

          {key:'zone',label:'Zone',w:'120px'},{key:'date',label:'Date',w:'80px'},{key:'status',label:'Status',w:'120px'},{key:'total',label:'Total',w:'80px'},{key:'action',label:'',w:'100px'},
        ]}
        rows={bookings.map(b=>({
          ...b,
          id: <span style={{fontFamily:'Sora',fontWeight:700,fontSize:13,color:A.black}}>{b.id}</span>,
          customer: <span style={{fontFamily:'Inter',fontSize:13,fontWeight:500,color:A.black}}>{b.customer}</span>,
          vehicle: <span style={{fontFamily:'Inter',fontSize:13,color:A.g700}}>{b.vehicle}</span>,
          zone: <span style={{fontFamily:'Inter',fontSize:13,color:A.g500}}>{b.zone}</span>,
          date: <span style={{fontFamily:'Inter',fontSize:12,color:A.g500}}>{b.date}</span>,
          status: <ABadge color={statusColor[b.status]}>{b.status}</ABadge>,
          total: <span style={{fontFamily:'Sora',fontWeight:700,fontSize:14,color:A.black}}>{b.total}</span>,
          action: <ABtn variant="outline">Details</ABtn>,
