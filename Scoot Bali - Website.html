<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scoot Bali — Premium Scooter Rental</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  input, select, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f5f5f5; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  input[type=range] { -webkit-appearance: none; height: 4px; border-radius: 2px; background: #ccc; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #FFD700; cursor: pointer; box-shadow: 0 2px 8px rgba(255,215,0,0.4); }
</style>
</head>
<body>
<div id="root"></div>
<script src="src/data.js"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/layout.jsx"></script>
<script type="text/babel" src="src/home.jsx"></script>
<script type="text/babel" src="src/catalog.jsx"></script>
<script type="text/babel" src="src/detail.jsx"></script>
<script type="text/babel" src="src/booking.jsx"></script>
<script type="text/babel" src="src/account.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#FFD700",
  "fontHeading": "Sora",
  "darkHero": true,
  "stickyBookBtn": true
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = React.useState('home');
  const [scooter, setScooter] = React.useState(null);

  const navigate = (p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <div style={{ minHeight: '100vh' }}>
      <Nav page={page} setPage={navigate} />

      {page === 'home'    && <HomePage    setPage={navigate} setScooter={setScooter} />}
      {page === 'catalog' && <CatalogPage setPage={navigate} setScooter={setScooter} />}
      {page === 'detail'  && <DetailPage  scooter={scooter || SCOOTERS[0]} setPage={navigate} />}
      {page === 'booking' && <BookingPage scooter={scooter || SCOOTERS[0]} setPage={navigate} />}
      {page === 'account' && <AccountPage setPage={navigate} />}

      <Footer setPage={navigate} />

      {/* Sticky Book Now floating CTA */}
      {page === 'home' && (
        <div style={{ position: 'fixed', bottom: 36, right: 36, zIndex: 990 }}>
          <Btn variant="primary" size="lg" onClick={() => navigate('catalog')}
            style={{ borderRadius: 100, padding: '16px 32px', boxShadow: '0 12px 40px rgba(255,215,0,0.45)', fontSize: 15 }}>
            Book Now →
          </Btn>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
